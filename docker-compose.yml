networks:
  wiki-net:
    driver: bridge

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    networks:
      - wiki-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "bash", "-c", "echo srvr | nc localhost 2181 | grep -q Mode"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    networks:
      - wiki-net
    ports:
      - "29092:29092"
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_LOG_RETENTION_HOURS: 48
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  kafka-init:
    image: confluentinc/cp-kafka:7.6.0
    networks:
      - wiki-net
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      bash -c "
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic wiki-raw --partitions 3 --replication-factor 1 --config retention.ms=172800000 &&
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic wiki-processed --partitions 3 --replication-factor 1 --config retention.ms=172800000 &&
        echo '--- Topics created ---' &&
        kafka-topics --bootstrap-server kafka:9092 --list
      "
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    networks:
      - wiki-net
    ports:
      - "8080:8080"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: wikit-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092